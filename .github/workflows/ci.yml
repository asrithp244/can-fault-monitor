name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── ROS 2 Humble ───────────────────────────────────────────────────────
      - name: Set up ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      # ── System deps (vcan tooling only — no libsocketcan needed) ──────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y can-utils iproute2

      # ── Virtual CAN interface (needed for any node spin-up in future tests)
      - name: Set up vcan0
        run: |
          sudo modprobe vcan
          sudo ip link add dev vcan0 type vcan
          sudo ip link set up vcan0

      # ── ROS deps from package.xml ──────────────────────────────────────────
      - name: Install ROS dependencies
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths . --ignore-src -r -y

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          mkdir -p ros2_ws/src/can_fault_monitor
          cp -r . ros2_ws/src/can_fault_monitor/
          cd ros2_ws
          colcon build --packages-select can_fault_monitor --symlink-install

      # ── Test (ament_lint: cpplint, cppcheck, copyright) ───────────────────
      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          source install/setup.bash
          colcon test --packages-select can_fault_monitor --return-code-on-test-failure
          colcon test-result --verbose

      # ── Tear down vcan0 ────────────────────────────────────────────────────
      - name: Tear down vcan0
        if: always()
        run: sudo ip link delete vcan0
