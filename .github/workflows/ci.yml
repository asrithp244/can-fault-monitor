name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install dependencies ────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            cmake \
            libsocketcan-dev \
            can-utils \
            iproute2

      # ── 3. Build ───────────────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      # ── 4. Set up virtual CAN interface ────────────────────────────────────
      #  SocketCAN requires a network interface; vcan0 is a software loopback.
      - name: Set up vcan0
        run: |
          sudo modprobe vcan
          sudo ip link add dev vcan0 type vcan
          sudo ip link set up vcan0

      # ── 5. Run tests ───────────────────────────────────────────────────────
      - name: Run fault injection tests
        run: ctest --test-dir build --output-on-failure --timeout 30

      # ── 6. Tear down vcan0 ─────────────────────────────────────────────────
      - name: Tear down vcan0
        if: always()
        run: sudo ip link delete vcan0

  # ── Optional: build on multiple compilers ──────────────────────────────────
  build-matrix:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake libsocketcan-dev clang

      - name: Build with ${{ matrix.compiler }}
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=$CC \
                -DCMAKE_CXX_COMPILER=$CXX
          cmake --build build --parallel $(nproc)
