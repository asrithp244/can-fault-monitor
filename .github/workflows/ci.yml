name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── ROS 2 Humble ───────────────────────────────────────────────────────
      - name: Set up ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      # ── ROS deps from package.xml ──────────────────────────────────────────
      - name: Install ROS dependencies
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths . --ignore-src -r -y

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          mkdir -p $HOME/ros2_ws/src
          ln -s ${{ github.workspace }} $HOME/ros2_ws/src/can_fault_monitor
          cd $HOME/ros2_ws
          colcon build --packages-select can_fault_monitor --symlink-install

      # ── Test (ament_lint: cpplint, cppcheck, copyright) ───────────────────
      # Note: lint warnings are reported but do not fail the build.
      # Integration tests require a physical or virtual CAN interface.
      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          cd $HOME/ros2_ws
          source install/setup.bash
          colcon test --packages-select can_fault_monitor || true
          colcon test-result --verbose || true
